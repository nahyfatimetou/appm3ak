name: appm3ak
description: "Ma3ak - Application mobile pour personnes en situation de handicap en Tunisie et leurs accompagnants."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0-290.4.beta

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP & Storage
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.3

  # Navigation
  go_router: ^14.6.2

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Image handling
  image_picker: ^1.1.2

  # Text-to-Speech
  flutter_tts: ^4.1.0

  # Utils
  equatable: ^2.0.7

  # Geolocation
  geolocator: ^13.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
